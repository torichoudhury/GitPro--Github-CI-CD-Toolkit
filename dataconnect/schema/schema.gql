type User @table {
  displayName: String!
  email: String
  photoUrl: String
  createdAt: Timestamp!
}

type Concept @table {
  name: String!
  description: String!
  imageUrl: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  # relatedConcepts: [Concept] # Not supported. Use a join table or singular reference if appropriate for 1:1 or 1:N.
}

type ConceptRelationship @table(key: ["sourceConcept", "targetConcept"]) {
  sourceConcept: Concept!
  targetConcept: Concept!
}

type BestPractice @table {
  concept: Concept
  title: String!
  description: String!
  rationale: String!
  codeExample: String
  severity: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type AntiPattern @table {
  concept: Concept
  title: String!
  description: String!
  impact: String!
  recommendedFix: String!
  codeExample: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type WorkflowExample @table {
  name: String!
  description: String!
  workflowContent: String!
  languageOrFramework: String!
  tags: [String]
  difficulty: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Favorite @table {
  user: User!
  favoritableType: String!
  favoritableId: UUID!
  createdAt: Timestamp!
}

type UserNote @table {
  user: User!
  content: String!
  relatedToType: String
  relatedToId: UUID
  createdAt: Timestamp!
  updatedAt: Timestamp!
}